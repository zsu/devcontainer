services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    init: true
    tty: true
    volumes:
      - devcontainer-commandhistory:/commandhistory
      - devcontainer-claude:/home/node/.claude
      - devcontainer-config:/home/node/.config
      - ${DEVPOD_SSH_AUTH_SOCK:-/dev/null}:/run/host-ssh-agent.sock:ro

volumes:
  devcontainer-commandhistory:
  devcontainer-claude:
  devcontainer-config:
