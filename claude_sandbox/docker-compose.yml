services:
  workspace:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: sleep infinity
    init: true
    tty: true
    environment:
      - SSH_AUTH_SOCK=/run/host-ssh-agent.sock
    volumes:
      - .:/workspace:cached
      - devcontainer-commandhistory:/commandhistory
      - devcontainer-claude:/home/node/.claude
      - devcontainer-config:/home/node/.config
      - ${SSH_AUTH_SOCK}:/run/host-ssh-agent.sock:ro

volumes:
  devcontainer-commandhistory:
  devcontainer-claude:
  devcontainer-config:
